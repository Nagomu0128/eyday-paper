name: Deploy

# Push to main → quality gates → remote D1 migrate → build → deploy to Cloudflare
# Workers. Secrets stay in Cloudflare (set once via `wrangler secret put`); this
# workflow only needs an API token + account id to deploy.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

# Never run two deploys at once; let an in-flight deploy finish.
concurrency:
  group: deploy-main
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Quality gates (lint / typecheck / depcruise / test)
        run: npm run check

      - name: Apply D1 migrations (remote)
        run: npm run db:migrate:remote

      - name: Build (Vite client + Worker)
        run: npm run build

      - name: Deploy to Cloudflare Workers
        run: npx wrangler deploy
